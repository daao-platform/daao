upstream nexus_cluster {
    server nexus:8443;
}

# Conditionally set Connection header — "upgrade" for WebSocket, "" otherwise
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Request body size limit
    client_max_body_size 1m;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Proxy API requests to Nexus (single node)
    location /api/ {
        proxy_pass https://nexus_cluster;
        proxy_ssl_verify off;  # Internal Docker network — Nexus uses self-signed certs
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # HTTP/1.1 required for keepalive & WebSocket
        proxy_http_version 1.1;
        # Only set upgrade headers when client requests a WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Installer scripts — served directly, not through SPA fallback
    location = /install {
        alias /usr/share/nginx/scripts/install-satellite.sh;
        default_type text/plain;
        add_header Content-Disposition "inline";
        add_header Cache-Control "no-cache";
    }

    location = /install.sh {
        alias /usr/share/nginx/scripts/install-satellite.sh;
        default_type text/plain;
        add_header Content-Disposition "inline";
        add_header Cache-Control "no-cache";
    }

    location = /install.ps1 {
        alias /usr/share/nginx/scripts/install-satellite.ps1;
        default_type text/plain;
        add_header Content-Disposition "inline";
        add_header Cache-Control "no-cache";
    }

    # Satellite release binaries
    location /releases/ {
        alias /usr/share/nginx/releases/;
        default_type application/octet-stream;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback - serve index.html for all routes
    # This handles /login, /auth/callback, and all other SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' wss: ws: https://*:8446; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
}
