<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>Offline - DAAO Cockpit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #16213e;
      color: #eaeaea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 400px;
    }
    
    .offline-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #f59e0b;
    }
    
    p {
      color: #9ca3af;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .retry-btn {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .retry-btn:hover {
      background-color: #4338ca;
    }
    
    .retry-btn:active {
      background-color: #3730a3;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>The Cockpit requires an internet connection to manage your sessions. Please check your connection and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
  
  <script>
    // Auto-retry when back online
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
