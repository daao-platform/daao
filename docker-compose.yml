services:
  # ============================================================================
  # Database
  # ============================================================================

  postgres:
    image: postgres:18-alpine
    container_name: daao-postgres
    environment:
      POSTGRES_USER: daao
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: daao
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U daao -d daao" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - daao-network

  # ============================================================================
  # Nexus — API server + gRPC satellite gateway
  # ============================================================================

  nexus:
    build:
      context: .
      dockerfile: Dockerfile.nexus
    container_name: daao-nexus
    environment:
      DATABASE_URL: postgres://daao:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/daao?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      NEXUS_HTTP_ADDR: ":8443"
      NEXUS_GRPC_ADDR: ":8444"
      SERVER_CERT: /certs/server.crt
      SERVER_KEY: /certs/key.pem
      CLIENT_CAS: /certs/ca.crt
      # Session recordings
      DAAO_RECORDINGS_DIR: /data/recordings
      # Enterprise license
      DAAO_LICENSE_PUBLIC_KEY: ${DAAO_LICENSE_PUBLIC_KEY:-}
      DAAO_LICENSE_KEY: ${DAAO_LICENSE_KEY:-}
      # Owner user bootstrap (first startup only)
      DAAO_OWNER_EMAIL: ${DAAO_OWNER_EMAIL:-}
      DAAO_OWNER_PASSWORD: ${DAAO_OWNER_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8443:8443"   # HTTPS API + WebSocket
      - "8444:8444"   # gRPC (satellite connections)
      - "8446:8446/tcp"   # WebTransport (HTTP/3) — TCP for TLS handshake
      - "8446:8446/udp"   # WebTransport (HTTP/3 QUIC) — UDP for QUIC
    volumes:
      - ./certs:/certs:ro
      - ${DAAO_RECORDINGS_DIR:-./data/recordings}:/data/recordings
    healthcheck:
      test: [ "CMD", "wget", "--no-check-certificate", "--spider", "-q", "https://localhost:8443/health" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 45s
    networks:
      - daao-network
    restart: unless-stopped

  # ============================================================================
  # Cockpit — Web dashboard (nginx + React SPA)
  # ============================================================================

  cockpit:
    build:
      context: .
      dockerfile: Dockerfile.cockpit
    container_name: daao-cockpit
    ports:
      - "${COCKPIT_PORT:-8081}:80"
    depends_on:
      nexus:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - daao-network
    restart: unless-stopped

networks:
  daao-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
